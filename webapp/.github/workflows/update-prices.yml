name: "💰 Update Prices (Scraping)"

on:
  # Tous les jours à 5h UTC (après import Awin à 4h)
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      partner:
        description: "Marchand spécifique (ou laisser vide pour tous)"
        type: string
        required: false
      dry_run:
        description: "Dry run"
        type: boolean
        default: false

jobs:
  update-prices:
    name: "Scrape & update prices"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "webapp/requirements.txt"

      - name: Install dependencies
        run: pip install -r webapp/requirements.txt

      - name: Scrape prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          SCRAPING_BEE_API_KEY: ${{ secrets.SCRAPING_BEE_API_KEY }}
        run: |
          ARGS=""
          if [[ -n "${{ github.event.inputs.partner }}" ]]; then
            ARGS="$ARGS --partner ${{ github.event.inputs.partner }}"
          fi
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          python webapp/scripts/scrape_prices.py $ARGS

      - name: Trigger ISR revalidation
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"secret":"'"$REVALIDATE_SECRET"'","path":"/"}' \
            "$SITE_URL/api/revalidate" || true

      - name: Generate content for new comparisons
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          # Only generate content for comparisons that don't have it yet
          python webapp/scripts/generate-content.py --limit 5
