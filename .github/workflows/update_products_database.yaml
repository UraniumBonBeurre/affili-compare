# ══════════════════════════════════════════════════════════════════════════════
# update_products_database.yaml — Mise à jour quotidienne des produits
#
# Pipeline :
#   1. Import incrémental des flux Awin (recup_flux_awin.py --mode update)
#   2. Classification LLM des nouveaux produits (classification.py)
#   3. Génération embeddings pour les produits sans vecteur (create_embeddings.py)
#
# Cron : 02h00 UTC chaque jour
# ══════════════════════════════════════════════════════════════════════════════

name: "Update Products Database"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode d'import : update (incrémental) ou reset_and_fill (vide + remplit tout)"
        type: choice
        options:
          - update
          - reset_and_fill
        default: update
      max_per_merchant:
        description: "Nb max produits/marchand (reset_and_fill seulement, défaut: 1000)"
        type: string
        default: "1000"
      publish_pinterest:
        description: "Lancer la génération d'articles + publication Pinterest après la mise à jour"
        type: boolean
        default: false
      skip_import:
        description: "Sauter l'import Awin"
        type: boolean
        default: false
      skip_classification:
        description: "Sauter la classification LLM"
        type: boolean
        default: false
      skip_embeddings:
        description: "Sauter la génération d'embeddings"
        type: boolean
        default: false

jobs:
  update:
    name: "Import → Classify → Embed"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AWIN_API_TOKEN:            ${{ secrets.AWIN_API_TOKEN }}
      AWIN_PUBLISHER_ID:         ${{ secrets.AWIN_PUBLISHER_ID }}
      AWIN_PRODUCTDATA_KEY:      ${{ secrets.AWIN_PRODUCTDATA_KEY }}
      AWIN_FEED_ID_RDC:          ${{ secrets.AWIN_FEED_ID_RDC }}
      GOOGLE_AI_API_KEY:         ${{ secrets.GOOGLE_AI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-bge-m3

      - name: Install dependencies
        run: pip install requests python-dotenv sentence-transformers

      # ── 1. Import flux Awin ──────────────────────────────────────────────
      - name: Import Awin feeds (incremental)
        if: ${{ github.event.inputs.skip_import != 'true' }}
        env:
          IMPORT_MODE:        ${{ github.event.inputs.mode || 'update' }}
          MAX_PER_MERCHANT:   ${{ github.event.inputs.max_per_merchant || '1000' }}
        run: python3 update_products_database.py

      # ── 2. Classification LLM ───────────────────────────────────────────
      - name: Classify new products (LLM)
        if: ${{ github.event.inputs.skip_classification != 'true' }}
        run: python3 classification.py

      # ── 3. Embeddings ───────────────────────────────────────────────────
      - name: Generate embeddings (new products)
        if: ${{ github.event.inputs.skip_embeddings != 'true' }}
        run: python3 create_embeddings.py
      # ── 4. Publication Pinterest (optionnelle) ─────────────────────────
      - name: Generate & post Top Articles to Pinterest
        if: ${{ github.event.inputs.publish_pinterest == 'true' }}
        env:
          OLLAMA_CLOUD_API_KEY:   ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          OLLAMA_CLOUD_HOST:      ${{ secrets.OLLAMA_CLOUD_HOST }}
          OLLAMA_CLOUD_MODEL:     ${{ secrets.OLLAMA_CLOUD_MODEL }}
          HF_API_TOKEN:           ${{ secrets.HF_API_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:     ${{ secrets.PINTEREST_BOARD_ID }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:          ${{ secrets.R2_PUBLIC_URL }}
          NEXT_PUBLIC_SITE_URL:   ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: python3 create_and_post_top_products.py
      # ── Résumé ──────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "### Update Products — $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Mode    : ${{ github.event.inputs.mode || 'update' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Max/merchant: ${{ github.event.inputs.max_per_merchant || '1000' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pinterest: ${{ github.event.inputs.publish_pinterest || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Import  : ${{ github.event.inputs.skip_import != 'true' && '✅' || '⏭' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Classify: ${{ github.event.inputs.skip_classification != 'true' && '✅' || '⏭' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Embed   : ${{ github.event.inputs.skip_embeddings != 'true' && '✅' || '⏭' }}" >> $GITHUB_STEP_SUMMARY
