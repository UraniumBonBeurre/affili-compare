name: "📌 Publish Pinterest Pins"

on:
  # Publication automatique désactivée — réactiver en décommentant les crons
  # schedule:
  #   - cron: "0 8 * * *"
  #   - cron: "0 14 * * *"
  #   - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (simule sans publier)"
        type: boolean
        default: false
      comparison_id:
        description: "ID comparison spécifique (optionnel)"
        type: number
        required: false
      limit:
        description: "Nombre max de pins à publier"
        type: number
        default: 3

jobs:
  publish:
    name: "Publish pins"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "webapp/requirements.txt"

      - name: Install dependencies
        run: pip install -r webapp/requirements.txt

      - name: Generate & Publish pins
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          ARGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ -n "${{ github.event.inputs.comparison_id }}" ]]; then
            ARGS="$ARGS --comparison-id ${{ github.event.inputs.comparison_id }}"
          fi
          LIMIT="${{ github.event.inputs.limit || '3' }}"
          python webapp/scripts/publish-pinterest.py $ARGS --limit "$LIMIT"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Pinterest publish failed. Check token validity and rate limits."
          echo "Recall: Pinterest access tokens expire after ~60 days."
          echo "Refresh via: python webapp/scripts/refresh_pinterest_token.py"
