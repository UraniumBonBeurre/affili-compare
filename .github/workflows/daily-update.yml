# ══════════════════════════════════════════════════════════════════════════════
# daily-update.yml — Pipeline quotidien complet
#
# Ordre d'exécution :
#   1. 02h00 UTC  Téléchargement du flux RdC (Awin API)
#   2.            Import incrémental dans Supabase (upsert → nouveaux seult)
#   3.            Génération des embeddings pour les nouveaux produits
#   4.            Génération des articles Top 5 du mois (LLM optionnel)
#
# Déclenchement manuel : GitHub → Actions → "Daily Full Update" → Run workflow
#
# Secrets requis :
#   NEXT_PUBLIC_SUPABASE_URL      ex: https://xxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY     clé service Supabase
#   AWIN_API_TOKEN                token Awin Publisher
#   AWIN_PUBLISHER_ID             ID publisher Awin
#   AWIN_FEED_ID_RDC              ID du flux Rue du Commerce
#   HF_API_TOKEN                  (optionnel) pour LLM blurbs Top 5
# ══════════════════════════════════════════════════════════════════════════════

name: "Daily Full Update"

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC — avant les autres workflows
  workflow_dispatch:
    inputs:
      skip_import:
        description: "Sauter l'import du flux (réutiliser le cache)"
        type: boolean
        default: false
      skip_embeddings:
        description: "Sauter la génération d'embeddings"
        type: boolean
        default: false
      skip_top5:
        description: "Sauter la génération des articles Top 5"
        type: boolean
        default: false

jobs:
  update:
    name: "Import → Embeddings → Top 5"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AWIN_API_TOKEN:            ${{ secrets.AWIN_API_TOKEN }}
      AWIN_PUBLISHER_ID:         ${{ secrets.AWIN_PUBLISHER_ID }}
      AWIN_FEED_ID_RDC:          ${{ secrets.AWIN_FEED_ID_RDC }}
      HF_API_TOKEN:              ${{ secrets.HF_API_TOKEN }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache HuggingFace model (~118 Mo)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-multilingual-e5-small

      - name: Install dependencies
        run: pip install requests python-dotenv supabase sentence-transformers

      # ── 3. Import du flux RdC (incrémental via upsert) ──────────────────────
      - name: Import feed (incremental upsert)
        if: ${{ github.event.inputs.skip_import != 'true' }}
        working-directory: affili-compare
        run: |
          echo "📥 Import incrémental du flux Rue du Commerce…"
          python3 scripts/bulk-import-feed.py
          echo "✅ Import terminé"

      # ── 4. Embeddings pour les nouveaux produits ────────────────────────────
      - name: Generate embeddings (new products only)
        if: ${{ github.event.inputs.skip_embeddings != 'true' }}
        working-directory: affili-compare
        run: |
          echo "🧠 Embeddings pour les produits sans vecteur…"
          python3 scripts/generate-embeddings.py
          echo "✅ Embeddings à jour"

      # ── 5. Articles Top 5 du mois ────────────────────────────────────────────
      - name: Generate Top 5 articles
        if: ${{ github.event.inputs.skip_top5 != 'true' }}
        working-directory: affili-compare
        run: |
          echo "📝 Génération des articles Top 5…"
          python3 scripts/generate-top5.py
          echo "✅ Articles Top 5 à jour"

      # ── 6. Résumé ────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "### Daily update — $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Import flux : ${{ github.event.inputs.skip_import != 'true' && '✅' || '⏭' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Embeddings  : ${{ github.event.inputs.skip_embeddings != 'true' && '✅' || '⏭' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Top 5       : ${{ github.event.inputs.skip_top5 != 'true' && '✅' || '⏭' }}" >> $GITHUB_STEP_SUMMARY
