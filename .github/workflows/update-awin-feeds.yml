name: "🏪 Update Awin Feeds"

on:
  # Tous les jours à 4h UTC (avant le démarrage US, données fraîches pour la journée)
  schedule:
    - cron: "0 4 * * *"
  # Déclenchement manuel
  workflow_dispatch:
    inputs:
      merchant:
        description: "Marchand spécifique (ou 'all' pour les actifs)"
        type: choice
        options: ["all", "rue-du-commerce", "fnac", "darty", "boulanger", "amazon_fr"]
        default: "all"
      dry_run:
        description: "Dry run"
        type: boolean
        default: false
      all_merchants:
        description: "Inclure les marchands inactifs"
        type: boolean
        default: false

jobs:
  import-feeds:
    name: "Import Awin product feeds"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import Awin feeds
        env:
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
          AWIN_PUBLISHER_ID: ${{ secrets.AWIN_PUBLISHER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MERCHANT="${{ github.event.inputs.merchant || 'all' }}"
          ARGS="--merchant $MERCHANT"
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ "${{ github.event.inputs.all_merchants }}" == "true" ]]; then
            ARGS="$ARGS --all-merchants"
          fi
          python scripts/import-awin-feed.py $ARGS

      - name: Trigger ISR revalidation
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"secret":"'"$REVALIDATE_SECRET"'","path":"/"}' \
            "$SITE_URL/api/revalidate" || echo "ISR revalidation skipped (not critical)"
